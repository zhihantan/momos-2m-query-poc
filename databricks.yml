# Databricks Asset Bundle — one command deploys the whole showcase:
#   databricks bundle deploy -t dev -p your-profile
#
# Resources: the serverless SQL warehouse under test, the data-gen job
# (serverless), the benchmark job (single-node classic + analyze), and the
# AI/BI dashboard. Names are literal (no dev-mode prefixing) so the Python in
# src/ can find the warehouse by the name in config.yaml — deploy one copy per
# workspace.
bundle:
  name: momos_2m_query_poc

include:
  - resources/*.yml

# Keep resource names literal and stable across deploys.
targets:
  dev:
    default: true
    workspace:
      host: https://YOUR-WORKSPACE.cloud.databricks.com
