# Two jobs:
#   momos_generate_data — synthesize the star schema (serverless). Run once per scale.
#   momos_benchmark     — drive the load (single-node classic) then analyze (serverless).
#
# warehouse_id is injected from the warehouse resource, so no name lookup is needed.
resources:
  jobs:

    momos_generate_data:
      name: momos_generate_data
      tasks:
        - task_key: generate
          notebook_task:
            notebook_path: ../notebooks/01_generate_data.py
            base_parameters:
              bundle_root: ${workspace.file_path}
              scale: sf1                       # override to 'full' for the showcase run
          # No cluster block -> notebook runs on serverless compute.

    momos_benchmark:
      name: momos_benchmark
      # Allow several generator instances to run at once and share a run_tag:
      # one serverless node caps ~130 QPS, so N instances -> ~130*N QPS. The
      # combined load is aggregated in system.query.history by the shared tag.
      max_concurrent_runs: 12
      tasks:
        - task_key: run_benchmark
          notebook_task:
            notebook_path: ../notebooks/02_run_benchmark.py
            base_parameters:
              bundle_root: ${workspace.file_path}
              warehouse_id: ${resources.sql_warehouses.momos_wh.id}
              use_smoke: "true"                # smoke defaults; override widgets for the full run
          # No cluster block -> serverless. The load generator is a driver-side
          # thread pool (pure Python + network), so serverless is a perfect fit;
          # the notebook %pip-installs databricks-sql-connector.

        - task_key: analyze
          depends_on:
            - task_key: run_benchmark
          notebook_task:
            notebook_path: ../notebooks/03_analyze_results.py
            base_parameters:
              bundle_root: ${workspace.file_path}
              warehouse_id: ${resources.sql_warehouses.momos_wh.id}
          # No cluster block -> serverless.

    # Single-job, executor-distributed generator: mapInPandas fans thread pools
    # across serverless executors, so ONE job scales past the ~150 QPS/node cap.
    momos_benchmark_distributed:
      name: momos_benchmark_distributed
      # On serverless-only, one instance stays single-node (~220 QPS); run several
      # sharing a run_tag (each lands on its own node) to exceed the single-node cap.
      max_concurrent_runs: 8
      tasks:
        - task_key: run_benchmark_distributed
          notebook_task:
            notebook_path: ../notebooks/04_run_benchmark_distributed.py
            base_parameters:
              bundle_root: ${workspace.file_path}
              warehouse_id: ${resources.sql_warehouses.momos_wh.id}
              mode: serving
              scale: full
              # Serverless-only here keeps mapInPandas on ONE node, so size the
              # partitions to ~one node's cores (single wave). On a CLASSIC
              # multi-node cluster, raise num_partitions >> total cores to fan out.
              num_partitions: "24"
              threads_per_partition: "8"
              duration_seconds: "600"
              pace: "false"
          # No cluster block -> serverless (see docs/tuning.md §7 for the multi-node caveat).
        - task_key: analyze
          depends_on:
            - task_key: run_benchmark_distributed
          notebook_task:
            notebook_path: ../notebooks/03_analyze_results.py
            base_parameters:
              bundle_root: ${workspace.file_path}
              warehouse_id: ${resources.sql_warehouses.momos_wh.id}
